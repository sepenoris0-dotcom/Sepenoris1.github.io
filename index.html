<!DOCTYPE html>
<html>
<head>
    <title>KULUNA VS PNC v3.0 - BOSS FINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; }
        canvas { display: block; margin: 0 auto; }
        #score { position: absolute; top: 10px; left: 10px; color: gold; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #lives { position: absolute; top: 10px; right: 10px; color: red; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #bossHp { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 80%; height: 25px; background: #333; border: 2px solid gold; display: none; }
        #bossHpBar { width: 100%; height: 100%; background: red; transition: 0.3s; }
        #bossText { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); color: red; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; display: none; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 40px; text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 30px; border: 3px solid gold; }
    </style>
</head>
<body>
    <div id="score">FC: 0</div>
    <div id="lives">❤️❤️❤️</div>
    <div id="bossHp"><div id="bossHpBar"></div></div>
    <div id="bossText">COMMISSAIRE PNC 💀</div>
    <div id="gameOver">GAME OVER<br><span style="font-size:20px">Tap pour rejouer</span></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const baronImg = new Image(); baronImg.src = 'baron.png';
const gombeImg = new Image(); gombeImg.src = 'gombe.jpg';
const commissaireImg = new Image(); commissaireImg.src = 'commissaire.png';

let kuluna = { x: canvas.width/2, y: canvas.height-150, w: 90, h: 130, speed: 8 };
let jeeps = [];
let billets = [];
let pvs = []; // PV électroniques du boss
let boss = null;
let score = 0;
let lives = 3;
let gameRunning = true;
let bossSpawned = false;

function drawBackground() {
    ctx.drawImage(gombeImg, 0, 0, canvas.width, canvas.height);
}

function drawKuluna() {
    ctx.drawImage(baronImg, kuluna.x, kuluna.y, kuluna.w, kuluna.h);
}

function spawnJeep() {
    if (boss) return; // Pas de jeeps pendant le boss
    jeeps.push({ x: Math.random()*(canvas.width-80), y: -130, w: 80, h: 130, speed: 4+Math.random()*3 });
}

function spawnBillet() {
    billets.push({ x: Math.random()*(canvas.width-40), y: -40, w: 40, h: 20, speed: 3 });
}

function spawnBoss() {
    boss = { x: canvas.width/2-100, y: 80, w: 200, h: 200, hp: 100, maxHp: 100, speed: 2, dir: 1 };
    bossSpawned = true;
    document.getElementById('bossHp').style.display = 'block';
    document.getElementById('bossText').style.display = 'block';
    // Ici on mettra la musique épique plus tard
}

function shootPV() {
    if (!boss) return;
    pvs.push({ x: boss.x+boss.w/2-15, y: boss.y+boss.h, w: 30, h: 40, speed: 6 });
}

function update() {
    if (!gameRunning) return;

    // Spawn boss à 5000 FC
    if (score >= 5000 &&!bossSpawned) spawnBoss();

    // Jeeps normaux
    jeeps.forEach((j, i) => {
        j.y += j.speed;
        ctx.drawImage(commissaireImg, j.x, j.y, j.w, j.h);
        if (j.y > canvas.height) jeeps.splice(i,1);
        if (collision(kuluna, j)) {
            lives--; jeeps.splice(i,1);
            document.getElementById('lives').innerHTML = '❤️'.repeat(lives);
            if (lives <= 0) endGame();
        }
    });

    // Boss Commissaire
    if (boss) {
        boss.x += boss.speed * boss.dir;
        if (boss.x <= 0 || boss.x+boss.w >= canvas.width) boss.dir *= -1;
        ctx.drawImage(commissaireImg, boss.x, boss.y, boss.w, boss.h);

        // Barre de vie boss
        document.getElementById('bossHpBar').style.width = (boss.hp/boss.maxHp*100) + '%';

        // Collision Baron vs Boss = dégâts
        if (collision(kuluna, boss)) {
            boss.hp -= 2;
            kuluna.y = canvas.height-200; // Repousse le Baron
            if (boss.hp <= 0) {
                score += 10000;
                boss = null;
                document.getElementById('bossHp').style.display = 'none';
                document.getElementById('bossText').style.display = 'none';
            }
        }
    }

    // PV électroniques du boss
    pvs.forEach((p, i) => {
        p.y += p.speed;
        ctx.fillStyle = 'white';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'red';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('PV', p.x+5, p.y+25);
        if (p.y > canvas.height) pvs.splice(i,1);
        if (collision(kuluna, p)) {
            lives--; pvs.splice(i,1);
            document.getElementById('lives').innerHTML = '❤️'.repeat(lives);
            if (lives <= 0) endGame();
        }
    });

    // Billets FC
    billets.forEach((b, i) => {
        b.y += b.speed;
        ctx.fillStyle = 'lime';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = 'black';
        ctx.font = 'bold 12px Arial';
        ctx.fillText('FC', b.x+10, b.y+15);
        if (b.y > canvas.height) billets.splice(i,1);
        if (collision(kuluna, b)) {
            score += 100; billets.splice(i,1);
            document.getElementById('score').innerText = 'FC: ' + score;
        }
    });
}

function collision(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBackground();
    drawKuluna();
    update();
    if (gameRunning) requestAnimationFrame(draw);
}

document.addEventListener('touchmove', e => {
    e.preventDefault();
    kuluna.x = e.touches[0].clientX - kuluna.w/2;
}, {passive: false});

document.addEventListener('touchstart', e => {
    if (!gameRunning) location.reload();
});

function endGame() {
    gameRunning = false;
    document.getElementById('gameOver').style.display = 'block';
}

setInterval(spawnJeep, 1500);
setInterval(spawnBillet, 1800);
setInterval(shootPV, 2000); // Le boss tire toutes les 2s

baronImg.onload = () => { draw(); };
</script>
</body>
</html>
